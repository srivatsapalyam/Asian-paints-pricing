<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Price Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .tab-btn { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased selection:bg-blue-200">

        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-20">
            
            <div id="calculatorView" class="space-y-4">

                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Product Base</label>
                        <select id="productSelect" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                            <option value="">-- Select Product --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Pack Size</label>
                        <select id="packSelect" disabled class="w-full bg-gray-100 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none disabled:opacity-50">
                            <option value="">-- Select Pack Size --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Formulation / Shade</label>
                        <select id="shadeSelect" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                            <option value="0">STANDARD WHITE / NO TINT (₹0.00 colorant)</option>
                            <option value="50">DEEP ORANGE (₹50.00 colorant)</option>
                            <option value="100">PREMIUM RED (₹100.00 colorant)</option>
                            </select>
                    </div>

                    <button id="resetBtn" class="w-full mt-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg border border-gray-300 transition">
                        Reset Form
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">

                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between items-center text-gray-600">

                        </div>
                        <div class="flex justify-between items-center text-gray-600">
                            <span>Calculated Base Price</span>

                        </div>
                        <div class="flex justify-between items-center text-gray-600">
                            <span>Calculated Colourant Price</span>

                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-t border-dashed border-gray-300">

            <div id="settingsView" class="hidden space-y-4">

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Base MarkUp %</label>
                        <input type="number" id="baseMarkupInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Base Tax %</label>
                        <input type="number" id="baseTaxInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Colourant MarkUp %</label>
                        <input type="number" id="colMarkupInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Colourant Tax %</label>
                        <input type="number" id="colTaxInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>

                        Save Settings
                    </button>
                </div>
            </div>

        let settings = JSON.parse(localStorage.getItem('paintAppConfig')) || {
            baseMarkup: 6.0,
            baseTax: 18.0,
            colMarkup: 100.0,
            colTax: 0.0
        };

        const productSelect = document.getElementById('productSelect');
        const packSelect = document.getElementById('packSelect');
        const shadeSelect = document.getElementById('shadeSelect');
        const resetBtn = document.getElementById('resetBtn');
        
        const dealerLabel = document.getElementById('dealerPriceLabel');
        const baseLabel = document.getElementById('basePriceLabel');
        const colLabel = document.getElementById('colourantPriceLabel');
        const finalLabel = document.getElementById('finalPriceLabel');

        const inBaseMarkup = document.getElementById('baseMarkupInput');
        const inBaseTax = document.getElementById('baseTaxInput');
        const inColMarkup = document.getElementById('colMarkupInput');
        const inColTax = document.getElementById('colTaxInput');

        function initApp() {
            inBaseMarkup.value = settings.baseMarkup;
            inBaseTax.value = settings.baseTax;
            inColMarkup.value = settings.colMarkup;
            inColTax.value = settings.colTax;

            products.forEach((prod, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.textContent = prod.name;
                productSelect.appendChild(opt);
            });
        }

        productSelect.addEventListener('change', (e) => {
            packSelect.innerHTML = '<option value="">-- Select Pack Size --</option>';
            if(e.target.value === "") {
                packSelect.disabled = true;
                calculate();
                return;
            }
            
            packSelect.disabled = false;
            packSelect.classList.remove('bg-gray-100');
            packSelect.classList.add('bg-gray-50');

            const selectedProduct = products[e.target.value];
            selectedProduct.packs.forEach((pack) => {
                let opt = document.createElement('option');
                opt.value = pack.price;
                opt.textContent = `${pack.size} - (₹${pack.price.toFixed(2)})`;
                packSelect.appendChild(opt);
            });
            calculate();
        });

        packSelect.addEventListener('change', calculate);
        shadeSelect.addEventListener('change', calculate);

        resetBtn.addEventListener('click', () => {
            productSelect.value = "";
            
            packSelect.innerHTML = '<option value="">-- Select Pack Size --</option>';
            packSelect.disabled = true;
            packSelect.classList.remove('bg-gray-50');
            packSelect.classList.add('bg-gray-100');
            
            shadeSelect.value = "0";
            calculate(); 
        });

        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            settings = {
                baseMarkup: parseFloat(inBaseMarkup.value) || 0,
                baseTax: parseFloat(inBaseTax.value) || 0,
                colMarkup: parseFloat(inColMarkup.value) || 0,
                colTax: parseFloat(inColTax.value) || 0
            };
            localStorage.setItem('paintAppConfig', JSON.stringify(settings));
            alert("Settings Saved!");
            calculate(); 
        });

        const calcView = document.getElementById('calculatorView');
        const setView = document.getElementById('settingsView');
        const btnCalc = document.getElementById('navCalcBtn');
        const btnSet = document.getElementById('navSetBtn');
        const headerTitle = document.getElementById('headerTitle');

        btnCalc.addEventListener('click', () => {
            calcView.classList.remove('hidden');
            setView.classList.add('hidden');
            headerTitle.textContent = "Price Calculator";
            
            btnCalc.classList.add('text-blue-600', 'border-blue-600', 'bg-blue-50');
            btnCalc.classList.remove('border-transparent');
            btnSet.classList.remove('text-blue-600', 'border-blue-600', 'bg-blue-50');
            btnSet.classList.add('border-transparent');
        });

        btnSet.addEventListener('click', () => {
            setView.classList.remove('hidden');
            calcView.classList.add('hidden');
            headerTitle.textContent = "Formula Settings";

            btnSet.classList.add('text-blue-600', 'border-blue-600', 'bg-blue-50');
            btnSet.classList.remove('border-transparent');
            btnCalc.classList.remove('text-blue-600', 'border-blue-600', 'bg-blue-50');
            btnCalc.classList.add('border-transparent');
        });

        function calculate() {
            let dealerPrice = parseFloat(packSelect.value) || 0;
            let rawColCost = parseFloat(shadeSelect.value) || 0;

            dealerLabel.textContent = `₹${dealerPrice.toFixed(2)}`;

            let finalBase = dealerPrice * (1 + (settings.baseMarkup / 100)) * (1 + (settings.baseTax / 100));
            let finalCol = rawColCost * (1 + (settings.colMarkup / 100)) * (1 + (settings.colTax / 100));
            let finalPrice = finalBase + finalCol;

            baseLabel.textContent = `₹${finalBase.toFixed(2)}`;
            colLabel.textContent = `₹${finalCol.toFixed(2)}`;
            finalLabel.textContent = `₹${finalPrice.toFixed(2)}`;
        }

        initApp();
