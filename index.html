<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Price Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .tab-btn { transition: all 0.2s ease; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased selection:bg-blue-200">

    <div class="max-w-md mx-auto bg-gray-50 min-h-screen shadow-xl relative overflow-hidden flex flex-col">
        
        <header class="bg-blue-600 text-white p-4 shadow-md z-10">
            <h1 class="text-lg font-semibold truncate" id="headerTitle">Price Calculator</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-20">
            
            <div id="calculatorView" class="space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-4">
                    
                    <div class="relative">
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Product Base / Shade (<span id="dbCount">0</span> loaded)</label>
                        <input type="text" id="productInput" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none" placeholder="Type to search (e.g., Royale or Base 1)..." autocomplete="off">
                        
                        <ul id="customDropdown" class="hidden absolute z-50 w-full bg-white border border-gray-300 rounded-lg mt-1 max-h-60 overflow-y-auto shadow-xl text-sm custom-scroll">
                            </ul>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Pack Size</label>
                        <select id="packSelect" disabled class="w-full bg-gray-100 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none disabled:opacity-50">
                            <option value="">-- Select Pack Size --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">Formulation / Shade</label>
                        <select id="shadeSelect" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none">
                            <option value="0">STANDARD WHITE / NO TINT (₹0.00 colorant)</option>
                            <option value="50">DEEP ORANGE (₹50.00 colorant)</option>
                            <option value="100">PREMIUM RED (₹100.00 colorant)</option>
                        </select>
                    </div>

                    <button id="resetBtn" class="w-full mt-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg border border-gray-300 transition">
                        Reset Form
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-sm font-bold text-gray-800 mb-4 border-b pb-2">Calculation Results</h2>
                    
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between items-center text-gray-600">
                            <span>Dealer Price (from PDF)</span>
                            <span id="dealerPriceLabel" class="font-medium text-gray-900">₹0.00</span>
                        </div>
                        <div class="flex justify-between items-center text-gray-600">
                            <span>Calculated Base Price</span>
                            <span id="basePriceLabel" class="font-medium text-gray-900">₹0.00</span>
                        </div>
                        <div class="flex justify-between items-center text-gray-600">
                            <span>Calculated Colourant Price</span>
                            <span id="colourantPriceLabel" class="font-medium text-gray-900">₹0.00</span>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-t border-dashed border-gray-300">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-gray-800 uppercase tracking-wider">Final Price</span>
                            <span id="finalPriceLabel" class="text-2xl font-black text-blue-600">₹0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="settingsView" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-4">
                    <h2 class="text-sm font-bold text-gray-800 mb-2 border-b pb-2">Formula Settings (%)</h2>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Base MarkUp %</label>
                        <input type="number" id="baseMarkupInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Base Tax %</label>
                        <input type="number" id="baseTaxInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Colourant MarkUp %</label>
                        <input type="number" id="colMarkupInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">Colourant Tax %</label>
                        <input type="number" id="colTaxInput" step="0.1" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 outline-none">
                    </div>

                    <button id="saveSettingsBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition">
                        Save Settings
                    </button>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-4 mt-4">
                    <h2 class="text-sm font-bold text-gray-800 border-b pb-2">Import Custom Database (CSV)</h2>
                    <p class="text-xs text-gray-500">Upload an Excel CSV file to instantly load all 4,000+ products.</p>
                    
                    <input type="file" id="csvFileInput" accept=".csv" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 outline-none cursor-pointer">
                    
                    <button id="clearDbBtn" class="w-full mt-2 bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold py-2 px-4 rounded-lg border border-red-100 transition">
                        Reset Database to Default (200+ Items)
                    </button>
                </div>
            </div>

            { name: "APCOLITE ENAMEL - OXFORD BLUE", packs: [{ size: "500 ML", price: 140.00 }, { size: "1 LIT", price: 270.00 }, { size: "4 LIT", price: 1040.00 }] },
            { name: "APCOLITE ENAMEL - SMOKE GREY", packs: [{ size: "500 ML", price: 135.00 }, { size: "1 LIT", price: 260.00 }, { size: "4 LIT", price: 1000.00 }] }

        let products = JSON.parse(localStorage.getItem('paintAppProducts')) || defaultProducts;
        let settings = JSON.parse(localStorage.getItem('paintAppConfig')) || { baseMarkup: 6.0, baseTax: 18.0, colMarkup: 100.0, colTax: 0.0 };

        const productInput = document.getElementById('productInput');
        const customDropdown = document.getElementById('customDropdown');
        const packSelect = document.getElementById('packSelect');
        const shadeSelect = document.getElementById('shadeSelect');
        
        function initApp() {
            document.getElementById('baseMarkupInput').value = settings.baseMarkup;
            document.getElementById('baseTaxInput').value = settings.baseTax;
            document.getElementById('colMarkupInput').value = settings.colMarkup;
            document.getElementById('colTaxInput').value = settings.colTax;
            document.getElementById('dbCount').textContent = products.length;
            
            packSelect.innerHTML = '<option value="">-- Select Pack Size --</option>';
            packSelect.disabled = true;
            calculate();
        }

        // CUSTOM DROPDOWN LOGIC
        function renderDropdown(searchText = "") {
            customDropdown.innerHTML = '';
            const lowerSearch = searchText.toLowerCase();
            
            const filtered = products.filter(p => p.name.toLowerCase().includes(lowerSearch)).slice(0, 50);
            
            if(filtered.length === 0) {
                customDropdown.innerHTML = '<li class="p-3 text-gray-500 text-center italic">No products found</li>';
            } else {
                filtered.forEach(prod => {
                    const li = document.createElement('li');
                    li.className = "p-3 hover:bg-blue-50 cursor-pointer border-b border-gray-100 last:border-0 text-gray-800 font-medium active:bg-blue-100";
                    li.textContent = prod.name;
                    
                    li.onmousedown = (e) => {
                        e.preventDefault(); 
                        selectProduct(prod);
                    };
                    customDropdown.appendChild(li);
                });
            }
            customDropdown.classList.remove('hidden');
        }

        function selectProduct(prod) {
            productInput.value = prod.name;
            customDropdown.classList.add('hidden');
            
            packSelect.innerHTML = '<option value="">-- Select Pack Size --</option>';
            packSelect.disabled = false;
            packSelect.classList.remove('bg-gray-100'); 
            packSelect.classList.add('bg-gray-50');

            prod.packs.forEach((pack) => {
                let opt = document.createElement('option');
                opt.value = pack.price;
                opt.textContent = `${pack.size} - (₹${pack.price.toFixed(2)})`;
                packSelect.appendChild(opt);
            });
            calculate();
        }

        productInput.addEventListener('focus', () => renderDropdown(productInput.value));
        
        productInput.addEventListener('input', (e) => {
            renderDropdown(e.target.value);
            if(e.target.value === "") {
                packSelect.innerHTML = '<option value="">-- Select Pack Size --</option>';
                packSelect.disabled = true;
                calculate();
            }
        });

        productInput.addEventListener('blur', () => {
            setTimeout(() => customDropdown.classList.add('hidden'), 150);
        });

        // CSV PARSER
        function parseCSVRow(str) {
            let arr = []; let quote = false; let col = '';
            for (let i = 0; i < str.length; i++) {
                let cc = str[i], nc = str[i+1];
                if (cc === '"' && quote && nc === '"') { col += cc; ++i; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { arr.push(col.trim()); col = ''; continue; }
                col += cc;
            }
            arr.push(col.trim()); return arr;
        }

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split('\n');
                const newProducts = {};
                let count = 0;

                for(let i = 1; i < lines.length; i++) {
                    if(!lines[i].trim()) continue;
                    const cols = parseCSVRow(lines[i]);
                    if(cols.length >= 3) {
                        const name = cols[0]; const size = cols[1];
                        const price = parseFloat(cols[2].replace(/[^0-9.]/g, ''));

                        if(!isNaN(name) && name !== "") continue; 
                        if(name.toLowerCase() === "product name" || name.toLowerCase() === "dealer price") continue;

                        if(name && size && !isNaN(price)) {
                            if(!newProducts[name]) newProducts[name] = { name: name, packs: [] };
                            newProducts[name].packs.push({ size: size, price: price });
                            count++;
                        }
                    }
                }

                const productArray = Object.values(newProducts);
                if(productArray.length > 0) {
                    localStorage.setItem('paintAppProducts', JSON.stringify(productArray));
                    products = productArray;
                    productInput.value = '';
                    initApp();
                    alert(`Success! Loaded ${productArray.length} items and ${count} pack sizes into the database.`);
                } else {
                    alert("Could not read data. Ensure your CSV has 3 columns: Product Name, Pack Size, Price.");
                }
            };
            reader.readAsText(file);
        });

        document.getElementById('clearDbBtn').addEventListener('click', () => {
            if(confirm("Are you sure you want to reset to the default product list?")) {
                localStorage.removeItem('paintAppProducts');
                products = defaultProducts;
                productInput.value = '';
                initApp();
                alert("Database reset to default products.");
            }
        });

        packSelect.addEventListener('change', calculate);
        shadeSelect.addEventListener('change', calculate);

        document.getElementById('resetBtn').addEventListener('click', () => {
            productInput.value = ""; 
            shadeSelect.value = "0"; 
            packSelect.innerHTML = '<option value="">-- Select Pack Size --</option>';
            packSelect.disabled = true;
            packSelect.classList.remove('bg-gray-50'); 
            packSelect.classList.add('bg-gray-100');
            calculate(); 
        });

        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
            settings = {
                baseMarkup: parseFloat(document.getElementById('baseMarkupInput').value) || 0,
                baseTax: parseFloat(document.getElementById('baseTaxInput').value) || 0,
                colMarkup: parseFloat(document.getElementById('colMarkupInput').value) || 0,
                colTax: parseFloat(document.getElementById('colTaxInput').value) || 0
            };
            localStorage.setItem('paintAppConfig', JSON.stringify(settings));
            alert("Settings Saved!"); calculate(); 
        });

        function calculate() {
            let dealerPrice = parseFloat(packSelect.value) || 0;
            let rawColCost = parseFloat(shadeSelect.value) || 0;

            document.getElementById('dealerPriceLabel').textContent = `₹${dealerPrice.toFixed(2)}`;

            let finalBase = dealerPrice * (1 + (settings.baseMarkup / 100)) * (1 + (settings.baseTax / 100));
            let finalCol = rawColCost * (1 + (settings.colMarkup / 100)) * (1 + (settings.colTax / 100));
            let finalPrice = finalBase + finalCol;

            document.getElementById('basePriceLabel').textContent = `₹${finalBase.toFixed(2)}`;
            document.getElementById('colourantPriceLabel').textContent = `₹${finalCol.toFixed(2)}`;
            document.getElementById('finalPriceLabel').textContent = `₹${finalPrice.toFixed(2)}`;
        }

        // NAVIGATION
        const btnCalc = document.getElementById('navCalcBtn'), btnSet = document.getElementById('navSetBtn');
        const calcView = document.getElementById('calculatorView'), setView = document.getElementById('settingsView');
        const headerTitle = document.getElementById('headerTitle');

        btnCalc.addEventListener('click', () => {
            calcView.classList.remove('hidden'); setView.classList.add('hidden'); headerTitle.textContent = "Price Calculator";
            btnCalc.classList.add('text-blue-600', 'border-blue-600', 'bg-blue-50'); btnCalc.classList.remove('border-transparent');
            btnSet.classList.remove('text-blue-600', 'border-blue-600', 'bg-blue-50'); btnSet.classList.add('border-transparent');
        });

        btnSet.addEventListener('click', () => {
            setView.classList.remove('hidden'); calcView.classList.add('hidden'); headerTitle.textContent = "Formula Settings";
            btnSet.classList.add('text-blue-600', 'border-blue-600', 'bg-blue-50'); btnSet.classList.remove('border-transparent');
            btnCalc.classList.remove('text-blue-600', 'border-blue-600', 'bg-blue-50'); btnCalc.classList.add('border-transparent');
        });

        initApp();
    </script>
